name: Build and deploy Python project to Azure Function App - healthSenseAiBackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install deps into the folder Azure Functions expects for Python deployments
      - name: Install dependencies into .python_packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Create deployment zip
        run: |
          zip -r functionapp.zip . \
            -x "venv/*" ".venv/*" ".git/*" "__pycache__/*" "*.pyc"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: functionapp.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'healthSenseAiBackend'
          package: 'functionapp.zip'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_422AA3216F654A87B2D615E6BB10F54A }}

          # Required per Microsoft Q&A guidance for Flex Consumption
          sku: 'flexconsumption'
          remote-build: true

          # Required per guidance for Consumption / Premium / Dedicated plans
          scm-do-build-during-deployment: true
          enable-oryx-build: true
